<section class="auth-section">
  <div class="auth-panel">
    <h1>Login</h1>
    <p class="helper-text">Sign in with your blog account.</p>

    <form #loginForm="ngForm" (ngSubmit)="onSubmit()" novalidate>
      <label for="username">User name</label>
      <input
        id="username"
        name="username"
        type="text"
        required
        autocomplete="username"
        [(ngModel)]="form.username"
        #username="ngModel"
      />
      @if (username.invalid && username.touched) {
        <p class="validation-message">User name is required.</p>
      }

      <label for="password">Password</label>
      <input
        id="password"
        name="password"
        type="password"
        required
        autocomplete="current-password"
        [(ngModel)]="form.password"
        #password="ngModel"
      />
      @if (password.invalid && password.touched) {
        <p class="validation-message">Password is required.</p>
      }

      @if (errorMessage) {
        <p class="error-message">{{ errorMessage }}</p>
      }

      <button type="submit" [disabled]="isSubmitting || loginForm.invalid">
        {{ isSubmitting ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <p class="auth-link">No account yet? <a routerLink="/register">Register</a></p>
  </div>
</section>
